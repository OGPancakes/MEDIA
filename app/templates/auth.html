{% extends "base.html" %}
{% block content %}
<section class="auth-hero-shell auth-page-shell">
    <div class="auth-brand-stage">
        <div class="auth-brand-mark">
            <img src="{{ url_for('static', filename='images/pia-logo.jpeg') }}" alt="Politics In Action logo" class="auth-mark-logo">
        </div>
    </div>

    <div class="auth-stack">
        <div class="auth-copy-block">
            <p class="eyebrow light">Politics In Action</p>
            <h1>Welcome back.</h1>
            <h2>Sign in with the account your camp admin gave you.</h2>
        </div>

        <div class="auth-panel-card dark-card">
            <h3>Sign in</h3>
            <form method="post" class="stack-form">
                <input type="text" name="username" placeholder="Username or email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign in</button>
            </form>
            <p class="tiny-copy">Accounts are created by camp admins. Use your username or email and password to continue.</p>
            <p class="tiny-copy"><a href="{{ url_for('privacy') }}">Privacy Policy</a> · <a href="{{ url_for('terms_of_use') }}">Terms of Use</a></p>
        </div>
    </div>
</section>
{% endblock %}
